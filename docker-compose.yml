version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9001}:9001"
      - "${RPC_PORT:-50051}:50051"
      - "${REST_PORT:-8080}:8080"
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_HOME=/root/.canopy
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - canopy-net

  auto-update:
    build:
      context: .docker/auto-update
      dockerfile: Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      # Check for updates every 12 hours (reduced from 24 for faster patch pickup)
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-43200}
      - CANOPY_CONTAINER=canopy-node
      - GITHUB_REPO=${GITHUB_REPO:-canopy-network/canopy}
    depends_on:
      - canopy
    networks:
      - canopy-net

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
